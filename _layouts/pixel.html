<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
	<title>{{ page.title | default: site.github.repository_name }}</title>
    <link rel="stylesheet" href="{{ '/assets/log.css?v=' | append: site.github.build_revision | relative_url }}">
    <link
      rel="shortcut icon"
      type="image/png"
      href="/una-theme-icons/16px/etc/heart_kitty.png"
    />
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="chrome=1">
	<meta name="viewport" content="width=device-width">
	<script type="text/javascript" src="/assets/prism.js"></script>
	<script type="text/javascript" src="/una-theme-icons/lib/twemoji.js"></script>
  <script>
    const SUPERSCRIPT = n =>
      String.fromCodePoint(
        ...[...('' + n)].map(i =>
          i > 0 && i < 4 ? [185, 178, 179][+i - 1] : +i + 8304
        )
      );
    window.addEventListener('load', _ => {
      [...document.getElementsByClassName('footnote')]
        .forEach(e => e.innerHTML = SUPERSCRIPT(e.innerHTML));
      [...document.getElementsByClassName('dropcap')]
        .forEach(e => e.innerHTML = e.innerHTML.replace(
          /^(\w)/g, (_, l) => `<img class="ill" alt="${l}"
            src="/una-theme-icons/30px/ill/${l.toLowerCase()}.png"/>`
        ));
      twemoji.parse(document.body, {base: "/una-theme-icons/"});
    })
  </script>
</head>
<body>
  <div class="article">
    <a href="/">← 猫.dev</a>
    {{ content }}
  </div>
</body>
</html>
